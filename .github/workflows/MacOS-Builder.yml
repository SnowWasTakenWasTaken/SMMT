name: build-macos

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ffmpeg
        run: brew install ffmpeg

      - name: Install npm dependencies
        run: npm ci
        
      - name: Fix app-builder permissions
        run: chmod +x node_modules/app-builder-bin/mac/app-builder_arm64

      - name: Normalize shell script line endings
        run: perl -pi -e 's/\r$//' build_macos.sh

      - name: Ensure root icon exists
        run: |
          if [ ! -f icon.icns ]; then
            if [ -f ICONS/placeholder_icon.icns ]; then
              echo "icon.icns missing at repo root; using ICONS/placeholder_icon.icns for CI build"
              cp ICONS/placeholder_icon.icns icon.icns
            else
              echo "Missing both icon.icns and ICONS/placeholder_icon.icns"
              exit 1
            fi
          fi

      - name: Build backend
        run: npm run build:backend:mac

      - name: List dist files
        run: ls -lah dist

      - name: Build macOS release artifacts
        env:
          DEBUG: electron-builder
        run: npx electron-builder --mac dmg zip --publish never

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: smmt-macos
          path: |
            dist/*.dmg
            dist/*.zip
            dist/youtube_downloader-macos
